<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Gateway — Billing Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; color: var(--text); }
    header .badge { background: var(--accent); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .config-card h2 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .config-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
    .field label { font-size: 12px; color: var(--muted); }
    .field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: var(--accent); }
    button { background: var(--accent); color: #fff; border: none; padding: 9px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-card .label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 768px) { .charts-row { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .card h3 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 220px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .badge-provider { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(99,102,241,0.15); color: var(--accent); }
    .error-banner { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #noData { text-align: center; color: var(--muted); padding: 48px 0; display: none; }
  </style>
</head>
<body>
  <header>
    <h1>LLM Gateway</h1>
    <span class="badge">Billing</span>
  </header>

  <main>
    <div class="config-card">
      <h2>Connection</h2>
      <div class="config-row">
        <div class="field">
          <label>Gateway Base URL</label>
          <input type="text" id="gatewayUrl" placeholder="https://xxxx.execute-api.us-east-1.amazonaws.com/v1" />
        </div>
        <div class="field">
          <label>API Key</label>
          <input type="password" id="apiKey" placeholder="gw_sk_..." autocomplete="off" />
        </div>
        <div class="field" style="max-width:140px">
          <label>From</label>
          <input type="date" id="fromDate" />
        </div>
        <div class="field" style="max-width:140px">
          <label>To</label>
          <input type="date" id="toDate" />
        </div>
        <button id="loadBtn" onclick="loadData()">Load</button>
      </div>
    </div>

    <div class="error-banner" id="errorBanner"></div>
    <div id="noData">No data found for the selected period.</div>

    <div id="dashboard" style="display:none">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Total Requests</div>
          <div class="value" id="statTotal">—</div>
          <div class="sub" id="statSuccessRate">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Input Tokens</div>
          <div class="value" id="statInput">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Output Tokens</div>
          <div class="value" id="statOutput">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Est. Cost (USD)</div>
          <div class="value" id="statCost">—</div>
          <div class="sub">30-day period</div>
        </div>
      </div>

      <div class="charts-row">
        <div class="card">
          <h3>Requests per Day</h3>
          <div class="chart-wrap"><canvas id="timeChart"></canvas></div>
        </div>
        <div class="card">
          <h3>Requests by Model</h3>
          <div class="chart-wrap"><canvas id="modelChart"></canvas></div>
        </div>
      </div>

      <div class="card">
        <h3>Model Breakdown</h3>
        <table id="modelTable">
          <thead>
            <tr>
              <th>Model Alias</th>
              <th>Requests</th>
              <th>Input Tokens</th>
              <th>Output Tokens</th>
              <th>Est. Cost</th>
            </tr>
          </thead>
          <tbody id="modelTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // Restore saved settings
    document.getElementById('gatewayUrl').value = localStorage.getItem('llmgw_url') || '';
    document.getElementById('apiKey').value = localStorage.getItem('llmgw_key') || '';

    const today = new Date().toISOString().slice(0, 10);
    const thirtyDaysAgo = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
    document.getElementById('fromDate').value = localStorage.getItem('llmgw_from') || thirtyDaysAgo;
    document.getElementById('toDate').value = localStorage.getItem('llmgw_to') || today;

    let timeChartInstance = null;
    let modelChartInstance = null;

    function fmt(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
      return String(n);
    }

    async function loadData() {
      const btn = document.getElementById('loadBtn');
      const url = document.getElementById('gatewayUrl').value.trim().replace(/\/$/, '');
      const key = document.getElementById('apiKey').value.trim();
      const from = document.getElementById('fromDate').value;
      const to = document.getElementById('toDate').value;

      if (!url || !key) { showError('Please enter the Gateway URL and API Key.'); return; }

      localStorage.setItem('llmgw_url', url);
      localStorage.setItem('llmgw_key', key);
      localStorage.setItem('llmgw_from', from);
      localStorage.setItem('llmgw_to', to);

      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;
      hideError();
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('noData').style.display = 'none';

      try {
        const resp = await fetch(`${url}/billing/usage?from=${from}&to=${to}`, {
          headers: { 'Authorization': `Bearer ${key}` }
        });
        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          throw new Error(body?.error?.message || `HTTP ${resp.status}`);
        }
        const data = await resp.json();
        renderDashboard(data);
      } catch (e) {
        showError(e.message || 'Failed to load data');
      } finally {
        btn.textContent = 'Load';
        btn.disabled = false;
      }
    }

    function renderDashboard(data) {
      if (!data.summary?.totalRequests) {
        document.getElementById('noData').style.display = 'block';
        return;
      }

      const s = data.summary;
      document.getElementById('statTotal').textContent = fmt(s.totalRequests);
      const rate = s.totalRequests > 0
        ? ((s.successfulRequests / s.totalRequests) * 100).toFixed(1) + '% success'
        : '—';
      document.getElementById('statSuccessRate').textContent = rate;
      document.getElementById('statInput').textContent = fmt(s.totalInputTokens);
      document.getElementById('statOutput').textContent = fmt(s.totalOutputTokens);
      document.getElementById('statCost').textContent = '$' + s.estimatedCostUsd.toFixed(4);

      // Time chart
      const dates = data.byDate.map(d => d.date);
      const counts = data.byDate.map(d => d.requests);
      if (timeChartInstance) timeChartInstance.destroy();
      timeChartInstance = new Chart(document.getElementById('timeChart'), {
        type: 'bar',
        data: {
          labels: dates,
          datasets: [{ label: 'Requests', data: counts, backgroundColor: 'rgba(99,102,241,0.6)', borderRadius: 4 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#94a3b8', maxTicksLimit: 10 }, grid: { color: '#1e293b' } },
            y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
          }
        }
      });

      // Model doughnut
      const models = data.byModel.slice(0, 8);
      const colors = ['#6366f1','#22c55e','#eab308','#ef4444','#06b6d4','#f97316','#8b5cf6','#ec4899'];
      if (modelChartInstance) modelChartInstance.destroy();
      modelChartInstance = new Chart(document.getElementById('modelChart'), {
        type: 'doughnut',
        data: {
          labels: models.map(m => m.modelAlias),
          datasets: [{ data: models.map(m => m.requests), backgroundColor: colors, borderWidth: 0 }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } }
          }
        }
      });

      // Model table
      const tbody = document.getElementById('modelTableBody');
      tbody.innerHTML = '';
      for (const m of data.byModel) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="badge-provider">${m.modelAlias}</span></td>
          <td>${fmt(m.requests)}</td>
          <td>${fmt(m.inputTokens)}</td>
          <td>${fmt(m.outputTokens)}</td>
          <td>$${m.estimatedCostUsd.toFixed(4)}</td>
        `;
        tbody.appendChild(tr);
      }

      document.getElementById('dashboard').style.display = 'block';
    }

    function showError(msg) {
      const el = document.getElementById('errorBanner');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideError() {
      document.getElementById('errorBanner').style.display = 'none';
    }
  </script>
</body>
</html>
